<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIND AI Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f111a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
            width: 300px;
            background: #161925;
            border-right: 1px solid #23283d;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid #23283d;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .section-title {
            color: #64748b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .selector-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            text-align: left;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .selector-btn:hover {
            background: #1e2235;
            color: #e2e8f0;
        }

        .selector-btn.active {
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.1), rgba(0, 242, 254, 0.1));
            color: #38bdf8;
            border-left: 3px solid #38bdf8;
            border-radius: 0 8px 8px 0;
            padding-left: 9px;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
        }

        .sidebar-footer {
            padding: 20px;
            background: #11131c;
            border-top: 1px solid #23283d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: #38bdf8;
            color: #0f111a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .logout-btn {
            color: #ef4444;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .logout-btn:hover {
            color: #f87171;
        }

        /* ================= CHAT MAIN AREA ================= */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #0f111a;
        }

        .chat-header {
            padding: 20px;
            background: #161925;
            border-bottom: 1px solid #23283d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-target-info h3 {
            font-size: 16px;
            color: #f1f5f9;
        }

        .messages-container {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-row {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            width: fit-content;
        }

        .message-row.self {
            margin-left: auto;
            align-items: flex-end;
        }

        .message-meta {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
            margin-left: 6px;
        }

        .message-bubble {
            background-color: #1e2235;
            color: #e2e8f0;
            padding: 12px 16px;
            border-radius: 12px;
            border-top-left-radius: 2px;
            line-height: 1.5;
            font-size: 15px;
            word-break: break-word;
        }

        .message-row.self .message-bubble {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #0f111a;
            font-weight: 500;
            border-radius: 12px;
            border-top-right-radius: 2px;
        }

        .message-row.ai .message-bubble {
            background-color: rgba(56, 189, 248, 0.08);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: #e2e8f0;
            border-radius: 12px;
        }

        .message-bubble img {
            max-width: 250px;
            border-radius: 8px;
            display: block;
            margin-bottom: 8px;
        }

        .typing-indicator {
            display: none;
            color: #38bdf8;
            font-size: 13px;
            font-style: italic;
            padding: 4px 24px;
        }

        /* ================= INPUT REGION ================= */
        .input-panel {
            padding: 20px;
            background: #161925;
            border-top: 1px solid #23283d;
        }

        .preview-box {
            display: none;
            position: relative;
            width: fit-content;
            margin-bottom: 10px;
        }

        .preview-box img {
            height: 60px;
            border-radius: 6px;
            border: 2px solid #38bdf8;
        }

        .remove-preview-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ef4444;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0f111a;
            border: 1px solid #23283d;
            border-radius: 10px;
            padding: 6px 12px;
        }

        .input-container:focus-within {
            border-color: #38bdf8;
        }

        .attach-btn {
            background: transparent;
            border: none;
            color: #64748b;
            font-size: 18px;
            cursor: pointer;
        }

        .attach-btn:hover {
            color: #38bdf8;
        }

        .main-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e2e8f0;
            padding: 10px 4px;
            font-size: 15px;
            outline: none;
        }

        .send-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            color: #0f111a;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- SIDEBAR VIEW -->
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-brain" style="color: #38bdf8; font-size: 22px;"></i>
                <h2>MIND AI Workspace</h2>
            </div>
            
            <div class="sidebar-content">
                <div class="channels-section">
                    <div class="section-title">Public Channels</div>
                    <div class="list-container" id="channels_list">
                        {% for room in rooms %}
                            <button class="selector-btn" id="btn-public-{{ room.id }}" onclick="switchTarget('public', '{{ room.id }}', '{{ room.name }}')">
                                <span><i class="fa-solid fa-hashtag" style="margin-right: 8px; opacity: 0.6;"></i> {{ room.name }}</span>
                            </button>
                        {% endfor %}
                    </div>
                </div>

                <div class="dms-section">
                    <div class="section-title">Direct Messages</div>
                    <div class="list-container" id="users_list">
                        {% for user in users %}
                            <button class="selector-btn" id="btn-private-{{ user.id }}" onclick="switchTarget('private', '{{ user.id }}', '{{ user.username }}')">
                                <span><i class="fa-regular fa-user" style="margin-right: 8px; opacity: 0.6;"></i> {{ user.username }}</span>
                                <span class="status-dot"></span>
                            </button>
                        {% endfor %}
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">{{ username[0].upper() }}</div>
                    <span style="font-weight: 600; font-size: 14px;">{{ username }}</span>
                </div>
                <a href="{{ url_for('logout') }}" class="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </div>
        </div>

        <!-- CHAT FRAME -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-target-info">
                    <h3 id="chat_title"># General</h3>
                </div>
            </div>

            <div class="messages-container" id="messages_container"></div>

            <div class="typing-indicator" id="ai_typing_state">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Gemini is thinking...
            </div>

            <div class="input-panel">
                <div class="preview-box" id="preview_box">
                    <img src="" id="img_preview_src">
                    <button class="remove-preview-btn" onclick="clearImagePreview()">×</button>
                </div>
                
                <div class="input-container">
                    <button class="attach-btn" onclick="document.getElementById('file_uploader').click()">
                        <i class="fa-solid fa-paperclip"></i>
                    </button>
                    <input type="file" id="file_uploader" accept="image/*" style="display: none;" onchange="handleImageSelection(event)">
                    
                    <input type="text" id="input_field" class="main-input" placeholder="Type message, use @ai with/without image..." onkeypress="if(event.key === 'Enter') sendMessage()">
                    
                    <button class="send-btn" onclick="sendMessage()">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const socket = io();
        let currentRoomType = 'public';
        let currentTargetId = '1'; 
        let currentTargetUsername = '';
        let globalImagePayload = null;

        // Auto initialization connect setup (FIX)
        socket.on('connect', () => {
            switchTarget(currentRoomType, currentTargetId, 'General');
        });

        function switchTarget(type, id, name) {
            currentRoomType = type;
            currentTargetId = id;
            
            document.querySelectorAll('.selector-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${type}-${id}`);
            if (activeBtn) activeBtn.classList.add('active');

            document.getElementById('chat_title').innerText = type === 'public' ? `# ${name}` : `🟢 ${name}`;
            if(type === 'private') {
                currentTargetUsername = name;
            }

            document.getElementById('messages_container').innerHTML = '';
            socket.emit('join', {
                username: "{{ username }}",
                room_type: currentRoomType,
                target_id: currentTargetId,
                target_username: currentTargetUsername
            });
        }

        socket.on('load_history', (history) => {
            const container = document.getElementById('messages_container');
            container.innerHTML = '';
            history.forEach(msg => appendMessageBubble(msg));
            scrollToBottom();
        });

        socket.on('message', (data) => {
            if (data.username === '🤖 AI Assistant') {
                document.getElementById('ai_typing_state').style.display = 'none';
            }
            appendMessageBubble(data);
            scrollToBottom();
        });

        socket.on('ai_typing', (state) => {
            if(state === 'start') {
                document.getElementById('ai_typing_state').style.display = 'block';
                scrollToBottom();
            }
        });

        function appendMessageBubble(data) {
            const container = document.getElementById('messages_container');
            const isSelf = data.username === "{{ username }}";
            const isAI = data.username === '🤖 AI Assistant';

            let rowClass = 'message-row';
            if (isSelf) rowClass += ' self';
            if (isAI) rowClass += ' ai';

            const row = document.createElement('div');
            row.className = rowClass;

            row.innerHTML = `
                <div class="message-meta">${data.username} • ${data.time}</div>
                <div class="message-bubble">${data.text}</div>
            `;
            container.appendChild(row);
        }

        function handleImageSelection(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (event) {
                    globalImagePayload = event.target.result;
                    document.getElementById('img_preview_src').src = globalImagePayload;
                    document.getElementById('preview_box').style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        function clearImagePreview() {
            globalImagePayload = null;
            document.getElementById('file_uploader').value = '';
            document.getElementById('preview_box').style.display = 'none';
        }

        function sendMessage() {
            const field = document.getElementById('input_field');
            const msgText = field.value.trim();

            if (!msgText && !globalImagePayload) return;

            const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            socket.emit('message', {
                username: "{{ username }}",
                text: msgText,
                image: globalImagePayload,
                time: timeStr,
                room_type: currentRoomType,
                target_id: currentTargetId
            });

            field.value = '';
            clearImagePreview();
        }

        function scrollToBottom() {
            const container = document.getElementById('messages_container');
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
