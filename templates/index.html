<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIND - Premium Multimodal AI</title>
    <script src="https://unpkg.com/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --user-msg: #334155;
            --ai-msg: #064e3b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .chat-container { width: 100%; max-width: 800px; height: 85vh; background: var(--panel-bg); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #334155; }
        .chat-header { background: #1e293b; padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; }
        .header-title { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 600; }
        .status-dot { width: 8px; height: 8px; background-color: var(--accent-green); border-radius: 50%; box-shadow: 0 0 8px var(--accent-green); }
        .header-right { display: flex; gap: 15px; align-items: center; }
        .user-tag { font-size: 14px; background: #334155; padding: 4px 12px; border-radius: 20px; color: var(--text-muted); }
        .logout-btn { color: #ef4444; text-decoration: none; font-size: 14px; font-weight: 600; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 20px 20px; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; animation: slideIn 0.2s ease-out forwards; }
        .msg-wrapper.user-side { align-self: flex-end; }
        .msg-wrapper.ai-side { align-self: flex-start; }
        .msg-sender { font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--text-muted); }
        .user-side .msg-sender { text-align: right; color: var(--accent-blue); }
        .ai-side .msg-sender { color: var(--accent-green); }
        .msg-card { padding: 12px 16px; border-radius: 14px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .user-side .msg-card { background: var(--user-msg); color: var(--text-main); border-bottom-right-radius: 2px; }
        .ai-side .msg-card { background: var(--ai-msg); color: #ecfdf5; border-bottom-left-radius: 2px; border-left: 4px solid var(--accent-green); }
        .msg-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; text-align: right; }

        /* Preview container for image attachments before sending */
        .preview-pane { display: none; background: #0f172a; padding: 10px 20px; align-items: center; gap: 15px; border-top: 1px solid #334155; }
        .preview-img { max-height: 60px; border-radius: 6px; border: 1px solid #475569; }
        .cancel-img { color: #ef4444; cursor: pointer; font-size: 14px; font-weight: bold; }

        .input-area { padding: 16px 20px; background: #1e293b; display: flex; gap: 12px; align-items: center; border-top: 1px solid #334155; }
        .file-label { background: #334155; color: white; padding: 12px 16px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; width: 46px; height: 46px; transition: background 0.2s; }
        .file-label:hover { background: #475569; }
        #image-input { display: none; }
        
        #message-input { flex: 1; background: #0f172a; border: 1px solid #334155; padding: 14px 20px; border-radius: 30px; color: var(--text-main); font-size: 15px; outline: none; }
        #send-btn { background: var(--accent-blue); color: white; border: none; padding: 0 24px; height: 46px; border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 15px; }
        #send-btn:hover { background: #2563eb; }

        .typing-bubble { display: none; align-self: flex-start; background: #1e293b; padding: 12px 18px; border-radius: 14px; margin-bottom: 10px; }
        .dots-container { display: flex; gap: 5px; align-items: center; }
        .dot { width: 7px; height: 7px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="header-title"><div class="status-dot"></div><span>MIND AI Workspace</span></div>
        <div class="header-right">
            <div class="user-tag" id="profile-tag">Connecting...</div>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </div>
    
    <div id="chat-box"></div>

    <!-- Pre-send attachment strip -->
    <div class="preview-pane" id="img-preview-pane">
        <img src="" class="preview-img" id="preview-element">
        <span class="cancel-img" id="clear-img-btn">✕ Remove</span>
    </div>

    <div class="typing-bubble" id="ai-typing-indicator">
        <div class="dots-container"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>
    
    <div class="input-area">
        <label for="image-input" class="file-label">📎</label>
        <input type="file" id="image-input" accept="image/*">
        <input type="text" id="message-input" placeholder="Type message, use @ai with/without image..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    let username = "{{ username }}"; 
    document.getElementById('profile-tag').innerText = "👤 " + username;

    const socket = io();
    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');
    const fileInput = document.getElementById('image-input');
    const sendBtn = document.getElementById('send-btn');
    const previewPane = document.getElementById('img-preview-pane');
    const previewElement = document.getElementById('preview-element');
    const clearImgBtn = document.getElementById('clear-img-btn');
    const typingIndicator = document.getElementById('ai-typing-indicator');

    let selectedBase64Image = null;

    // Handle File Selection
    fileInput.addEventListener('change', function() {
        const file = fileInput.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedBase64Image = e.target.result;
                previewElement.src = selectedBase64Image;
                previewPane.style.display = 'flex';
            };
            reader.readAsDataURL(file);
        }
    });

    // Clear Attachment
    clearImgBtn.addEventListener('click', function() {
        selectedBase64Image = null;
        fileInput.value = '';
        previewPane.style.display = 'none';
    });

    function appendMessage(data) {
        const wrapper = document.createElement('div');
        wrapper.classList.add('msg-wrapper');
        wrapper.classList.add(data.username === '🤖 AI Assistant' ? 'ai-side' : 'user-side');

        let rawText = data.text;
        // Basic Markdown parser for formatting **bold** tags
        if (typeof rawText === 'string' && !rawText.includes('<img')) {
            rawText = rawText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }

        wrapper.innerHTML = `
            <div class="msg-sender">${data.username}</div>
            <div class="msg-card">${rawText}</div>
            <div class="msg-time">${data.time}</div>
        `;
        chatBox.appendChild(wrapper);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    socket.on('load_history', function(history) {
        chatBox.innerHTML = "";
        history.forEach(appendMessage);
    });

    socket.on('message', function(data) {
        if (data.username === '🤖 AI Assistant') typingIndicator.style.display = 'none';
        appendMessage(data);
    });

    socket.on('ai_typing', function(status) {
        typingIndicator.style.display = (status === 'start') ? 'block' : 'none';
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    function sendMessage() {
        const text = messageInput.value.trim();
        // Send block activates if either text or image exists
        if (text !== "" || selectedBase64Image !== null) {
            const currentTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const messageData = {
                username: username,
                text: text,
                time: currentTime,
                image: selectedBase64Image
            };
            
            socket.emit('message', messageData);
            
            // Clear inputs and resetting strip view
            messageInput.value = "";
            selectedBase64Image = null;
            fileInput.value = '';
            previewPane.style.display = 'none';
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
