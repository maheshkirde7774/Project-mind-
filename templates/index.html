<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Startup Chat Room</title>
    <script src="https://unpkg.com/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background-color: #e5ddd5; }
        .chat-container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        .chat-header { background: #075e54; color: white; padding: 15px; font-size: 18px; font-weight: bold; }
        #chat-box { height: 400px; overflow-y: auto; padding: 15px; background: #f0f0f0; display: flex; flex-direction: column; }
        .msg-container { margin-bottom: 12px; padding: 8px 12px; border-radius: 8px; max-width: 75%; width: fit-content; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-sender { font-size: 12px; font-weight: bold; color: #35a084; margin-bottom: 3px; }
        .msg-text { font-size: 15px; color: #000; white-space: pre-wrap; }
        .msg-time { font-size: 10px; color: #777; text-align: right; margin-top: 4px; }
        .input-area { display: flex; padding: 10px; background: #f0f0f0; border-top: 1px solid #ddd; }
        #message-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; padding-left: 15px; }
        #send-btn { background: #075e54; color: white; border: none; padding: 0 20px; margin-left: 10px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #send-btn:hover { background: #128c7e; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Project Chat Room with DB</div>
    <div id="chat-box"></div>
    
    <div class="input-area">
        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    let inputName = prompt("Please enter your name:", "Mahesh");
    let username = (inputName && inputName.trim() !== "") ? inputName : "User_" + Math.floor(Math.random() * 100);

    const socket = io();
    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    // Helper function to append message inside the UI
    function appendMessage(data) {
        const msgContainer = document.createElement('div');
        msgContainer.classList.add('msg-container');

        if (data.username === '🤖 AI Assistant') {
            msgContainer.style.background = "#d1e7dd";
            msgContainer.style.borderLeft = "4px solid #0f5132";
        } else {
            msgContainer.style.background = "#ffffff";
        }

        // Clean Markdown bold parsing filter
        let formattedText = data.text;
        if (typeof formattedText === 'string') {
            formattedText = formattedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }

        msgContainer.innerHTML = `
            <div class="msg-sender">${data.username}</div>
            <div class="msg-text">${formattedText}</div>
            <div class="msg-time">${data.time}</div>
        `;
        
        chatBox.appendChild(msgContainer);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Load full history database records on connection initialization
    socket.on('load_history', function(history) {
        chatBox.innerHTML = ""; // Clear current view
        history.forEach(function(msg) {
            appendMessage(msg);
        });
    });

    // Listen for live single messages
    socket.on('message', function(data) {
        appendMessage(data);
    });

    function sendMessage() {
        const text = messageInput.value.trim();
        if (text !== "") {
            const currentTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const messageData = {
                username: username,
                text: text,
                time: currentTime
            };
            
            socket.emit('message', messageData);
            messageInput.value = "";
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
</script>
</body>
</html>
