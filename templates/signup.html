<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIND - Create Account</title>
    <style>
        :root { --bg-color: #0f172a; --panel-bg: #1e293b; --text-main: #f8fafc; --accent-green: #10b981; --accent-blue: #3b82f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-container { width: 100%; max-width: 400px; background: var(--panel-bg); border-radius: 12px; padding: 30px; border: 1px solid #334155; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { margin-bottom: 20px; text-align: center; font-weight: 600; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #94a3b8; }
        input { width: 100%; background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 8px; color: white; outline: none; }
        input:focus { border-color: var(--accent-blue); }
        .btn { width: 100%; background: var(--accent-green); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .btn:hover { background: #059669; }
        .links { margin-top: 15px; text-align: center; font-size: 14px; }
        .links a { color: var(--accent-blue); text-decoration: none; }
        .flash-msg { background: #7f1d1d; color: #fca5a5; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
<div class="auth-container">
    <h2>Create Account</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash-msg">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
        <div class="form-group">
            <label>Choose Username</label>
            <input type="text" name="username" required autocomplete="off">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button class="btn" type="submit">Register Account</button>
    </form>
    <div class="links">
        Already have an account? <a href="{{ url_for('login') }}">Log In</a>
    </div>
</div>
</body>
</html>
